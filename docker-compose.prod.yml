version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hacklaunch_prod_postgres
    environment:
      POSTGRES_USER: hacklaunch
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hacklaunch_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hacklaunch -d hacklaunch_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hacklaunch_prod_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: hacklaunch_prod_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_prod_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hacklaunch_prod_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://hacklaunch:password@postgres:5432/hacklaunch_db
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hacklaunch_prod_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: hacklaunch_prod_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_prod_data:
  redis_prod_data:
  qdrant_prod_data:
