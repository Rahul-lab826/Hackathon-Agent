version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hacklaunch_postgres
    environment:
      POSTGRES_USER: hacklaunch
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hacklaunch_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hacklaunch -d hacklaunch_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: hacklaunch_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
